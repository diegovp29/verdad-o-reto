<!DOCTYPE html>
<html lang="es" data-theme="dracula">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verdad o Reto</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center p-4">

  <!-- PANTALLA 1: Configuración de jugadores -->
  <div id="screen-setup" class="w-full max-w-2xl">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-primary mb-2">🎴 Verdad o Reto</h1>
      <p class="text-base-content/60">Añade los jugadores para empezar</p>
    </div>

    <div id="players-list" class="flex flex-col gap-3 mb-4"></div>

    <button id="btn-add-player" onclick="addPlayer()"
      class="btn btn-outline btn-primary w-full mb-6">
      + Añadir jugador
    </button>

    <button id="btn-start" onclick="startGame()"
      class="btn btn-primary w-full text-lg" disabled>
      ¡Empezar a jugar! 🎲
    </button>
  </div>

  <!-- PANTALLA 2: Juego -->
  <div id="screen-game" class="w-full max-w-xl hidden">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-primary mb-1">🎴 Verdad o Reto</h1>
      <div id="turn-info" class="text-base-content/70 text-sm"></div>
    </div>

    <!-- Card del jugador actual -->
    <div class="card bg-base-100 shadow-xl mb-6">
      <div class="card-body items-center text-center">
        <div id="current-avatar" class="avatar placeholder mb-2">
          <div class="bg-primary text-primary-content rounded-full w-16 text-2xl flex items-center justify-center"></div>
        </div>
        <h2 id="current-name" class="card-title text-2xl"></h2>
        <p id="current-sub" class="text-base-content/60 text-sm"></p>
      </div>
    </div>

    <!-- Elección -->
    <div id="choice-section" class="flex gap-4 mb-6">
      <button onclick="chooseOption('verdad')"
        class="btn btn-info flex-1 text-lg">🤔 Verdad</button>
      <button onclick="chooseOption('reto')"
        class="btn btn-warning flex-1 text-lg">🔥 Reto</button>
    </div>

    <!-- Resultado -->
    <div id="result-section" class="hidden">
      <div class="card bg-base-100 shadow-xl mb-6">
        <div class="card-body">
          <div id="result-badge" class="badge mb-2"></div>
          <p id="result-text" class="text-lg leading-relaxed"></p>
        </div>
      </div>
      <button onclick="nextTurn()" class="btn btn-primary w-full">
        Siguiente turno →
      </button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
